# Render.com blueprint — deploys the MOW CMS OS backend as a web service.
# In Render:  New ►  Blueprint  ►  connect this repo  ►  Apply.
#
# Runs on the paid Starter plan WITH a persistent disk mounted at the data
# folder, so users (collaborators), projects, staged edits and revision history
# all survive restarts and redeploys. The admin user + the canonical projects
# are also re-seeded on every boot as a safety net (see ensureSeedAdmin /
# ensureSeedProjects), so the portal is never empty even on a fresh disk.
services:
  - type: web
    name: mow-cms-os
    runtime: node
    plan: starter
    rootDir: cms-os/backend
    buildCommand: "echo no build needed — zero dependencies"
    startCommand: "node server.js"
    healthCheckPath: /api/health
    disk:
      name: mow-data
      mountPath: /opt/render/project/src/cms-os/backend/data
      sizeGB: 1
    envVars:
      - key: MOW_JWT_SECRET        # auto-generated secure secret
        generateValue: true
      - key: MOW_ADMIN_EMAIL       # you set this in the Render dashboard
        sync: false
      - key: MOW_ADMIN_PASSWORD    # you set this in the Render dashboard
        sync: false
      - key: MOW_GITHUB_TOKEN      # you set this in the Render dashboard
        sync: false
      - key: MOW_REPO_OWNER
        value: manoftheworldmedia
      - key: MOW_REPO_NAME
        value: mow
      - key: MOW_REPO_BRANCH
        value: main
