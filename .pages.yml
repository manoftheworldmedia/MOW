  # ═══════════ ② ABOUT ═══════════
  - name: about_content
    label: "② About — Content"
    description: "About page copy, Peter's portrait, and Google title/description. Updates /about/ on the live site."
    type: file
    path: content/about.json
    format: json
    fields:
      - name: meta
        label: "SEO · Google (title + description)"
        type: object
        fields:
          - { name: title, label: "Meta title", type: string }
          - { name: description, label: "Meta description", type: text }
      - { name: eyebrow, label: "Eyebrow", type: string }
      - { name: name_lead, label: "Name — lead (e.g. 'Peter Weltman, ')", type: string }
      - { name: name_role, label: "Name — gold role", type: string }
      - { name: intro, label: "Intro paragraph", type: text }
      - { name: bio, label: "Bio paragraph", type: text }
      - { name: role_tag, label: "Role tag", type: string }
      - { name: portrait, label: "Portrait photo", type: image }
      - { name: quote, label: "Pull quote", type: text }

  # ═══════════ ③ NEWS / NEWSROOM ═══════════
  - name: news
    label: "③ News — all posts"
    description: "Every post that appears on the homepage strip and the Newsroom. Set the Type, the published Date, a hero image, and toggle Featured (max 3 show on the homepage). Order on the Newsroom is grouped: Blog, Article, Thought Leadership, Press Release."
    type: file
    path: content/news.json
    format: json
    list: false
    fields:
      - name: items
        label: "Posts"
        type: object
        list: true
        fields:
          - { name: title, label: "Title", type: string }
          - name: type
            label: "Type"
            type: select
            options:
              values: ["Blog", "Article", "Thought Leadership", "Press Release"]
          - { name: date, label: "Published date", type: date, options: { format: "yyyy-MM-dd" } }
          - { name: summary, label: "Summary (card text)", type: text }
          - { name: hero, label: "Hero image (optional)", type: image }
          - { name: link, label: "Link (article page or external URL)", type: string }
          - { name: featured, label: "Feature on homepage (max 3)", type: boolean, default: false }

  # ─── Full article pages (long-form HTML; edit body + inline images here) ───
  - name: news_i2i
    label: "Article body · Impossible to Ignore"
    type: file
    path: impossible-to-ignore-is-the-new-standard-for-global-brand-distinctiveness/index.html
    format: raw
    fields:
      - { name: body, label: "Article", type: code, options: { language: html } }
