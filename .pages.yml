media:
  input: assets
  output: /assets
  extensions: [png, jpg, jpeg, gif, svg, webp, ico, avif]

content:
  # ========== MAIN PAGES ==========
  - name: homepage
    label: "① Homepage"
    description: "The full home scroll. Edit copy, the page title & meta description. IMPORTANT — make the same change in the Homepage (mirror) entry below."
    type: file
    path: index.html
    format: raw
    fields:
      - name: body
        label: "File content (HTML / text)"
        type: code
        options:
          language: html
  - name: homepage_mirror
    label: "① Homepage (mirror — keep identical)"
    description: "Duplicate of the homepage used by internal links. Keep identical to ① Homepage."
    type: file
    path: MOW.dc.html
    format: raw
    fields:
      - name: body
        label: "File content (HTML / text)"
        type: code
        options:
          language: html
  - name: about
    label: "② About — Peter Weltman"
    description: "About page copy, portrait reference, page title & meta description."
    type: file
    path: About.dc.html
    format: raw
    fields:
      - name: body
        label: "File content (HTML / text)"
        type: code
        options:
          language: html
  - name: blog_index
    label: "③ News / Journal index"
    description: "The News landing page with the article cards."
    type: file
    path: Blog.dc.html
    format: raw
    fields:
      - name: body
        label: "File content (HTML / text)"
        type: code
        options:
          language: html

